<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>健全度の杭 — Enneagram</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #F5EFE6;
    --surface:   #FBF8F3;
    --surface2:  #F0E9DF;
    --border:    #E0D5C7;
    --text:      #3D3028;
    --text-sub:  #9E8A78;
    --text-mute: #BFB0A0;
    --peg:       #B8834A;
    --peg-light: #E8D5B8;
    --healthy:   #6BAF8A;
    --average:   #C9963A;
    --unhealthy: #C07070;
    --shadow:    rgba(100,70,40,0.08);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Hiragino Mincho ProN', 'Yu Mincho', 'MS Mincho', Georgia, serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 28px 16px 60px;
  }

  #app { width: 100%; max-width: 460px; }

  /* ── SETUP ── */
  .setup-header { text-align: center; margin-bottom: 28px; }
  .setup-eyebrow { font-size: 0.6rem; letter-spacing: 0.25em; color: var(--text-mute); margin-bottom: 8px; }
  .setup-title { font-size: 1.4rem; font-weight: normal; color: var(--peg); letter-spacing: 0.12em; }
  .setup-sub { font-size: 0.75rem; color: var(--text-sub); margin-top: 8px; line-height: 1.6; }

  .type-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 28px;
  }

  .type-tile {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 16px 10px 14px;
    cursor: pointer;
    text-align: center;
    transition: all 0.18s ease;
    box-shadow: 0 2px 8px var(--shadow);
  }
  .type-tile:hover { border-color: var(--peg); transform: translateY(-1px); }
  .type-tile.selected {
    background: var(--peg);
    border-color: var(--peg);
    box-shadow: 0 4px 16px rgba(184,131,74,0.25);
  }

  .tile-num {
    font-size: 1.5rem;
    font-weight: bold;
    font-family: Georgia, serif;
    color: var(--peg);
    margin-bottom: 5px;
    transition: color 0.18s;
  }
  .type-tile.selected .tile-num { color: #FBF8F3; }

  .tile-keyword {
    font-size: 0.75rem;
    color: var(--text);
    letter-spacing: 0.04em;
    transition: color 0.18s;
    margin-bottom: 3px;
  }
  .type-tile.selected .tile-keyword { color: #FBF8F3; font-weight: bold; }

  .tile-fear {
    font-size: 0.6rem;
    color: var(--text-mute);
    letter-spacing: 0.02em;
    line-height: 1.3;
    transition: color 0.18s;
  }
  .type-tile.selected .tile-fear { color: rgba(251,248,243,0.7); }

  .start-btn {
    width: 100%;
    padding: 15px;
    background: var(--peg);
    color: #FBF8F3;
    border: none;
    border-radius: 12px;
    font-size: 0.88rem;
    font-family: inherit;
    font-weight: bold;
    cursor: pointer;
    letter-spacing: 0.08em;
    box-shadow: 0 4px 16px rgba(184,131,74,0.2);
    transition: all 0.18s;
  }
  .start-btn:disabled {
    background: var(--border);
    color: var(--text-mute);
    box-shadow: none;
    cursor: default;
  }
  .start-btn:not(:disabled):hover { filter: brightness(1.05); transform: translateY(-1px); }

  /* ── MAIN ── */
  .main-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .back-btn {
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    color: var(--text-sub);
    padding: 5px 11px;
    font-size: 0.68rem;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
  }
  .back-btn:hover { border-color: var(--peg); color: var(--peg); }

  .type-badge {
    font-size: 0.78rem;
    color: var(--text-sub);
    text-align: center;
  }
  .type-badge strong { color: var(--peg); font-size: 1rem; }
  .type-num-big {
    font-size: 1.6rem;
    font-weight: bold;
    font-family: Georgia, serif;
    color: var(--peg);
    letter-spacing: 0.05em;
  }

  /* ── PEG SLIDER ── */
  .slider-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 14px;
    box-shadow: 0 2px 8px var(--shadow);
  }
  .slider-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
  }
  .slider-label { font-size: 0.67rem; color: var(--text-sub); letter-spacing: 0.05em; }
  .slider-val { font-size: 1.1rem; font-weight: bold; font-family: Georgia, serif; }
  .slider-val-sub { font-size: 0.62rem; color: var(--text-mute); margin-left: 5px; }

  input[type=range] {
    width: 100%;
    accent-color: var(--peg);
    cursor: pointer;
    height: 4px;
  }
  .slider-ends {
    display: flex;
    justify-content: space-between;
    margin-top: 5px;
  }
  .slider-ends span { font-size: 0.6rem; }

  /* ── VIZ ROW ── */
  .viz-row { display: flex; gap: 12px; }

  svg { flex-shrink: 0; touch-action: none; }

  /* ── INFO PANEL ── */
  .info-panel { flex: 1; display: flex; flex-direction: column; gap: 8px; }

  .info-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 9px 12px;
    box-shadow: 0 1px 4px var(--shadow);
  }
  .info-label { font-size: 0.6rem; color: var(--text-mute); margin-bottom: 2px; letter-spacing: 0.05em; }
  .info-val { font-size: 0.82rem; font-weight: bold; }
  .info-sub { font-size: 0.6rem; color: var(--text-mute); margin-top: 1px; }

  .tension-bar-bg {
    background: var(--surface2);
    border-radius: 4px;
    height: 5px;
    margin: 5px 0 4px;
  }
  .tension-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.1s, background 0.1s;
  }

  /* ── SNAP BUTTON ── */
  .snap-btn {
    width: 100%;
    margin-top: 0;
    padding: 11px;
    border-radius: 12px;
    font-size: 0.85rem;
    font-family: inherit;
    font-weight: bold;
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: all 0.18s;
    border: none;
  }
  .snap-btn.active {
    background: var(--peg);
    color: #FBF8F3;
    box-shadow: 0 4px 14px rgba(184,131,74,0.2);
  }
  .snap-btn.active:hover { filter: brightness(1.05); }
  .snap-btn.inactive {
    background: var(--surface2);
    color: var(--text-mute);
    cursor: default;
  }
  .drag-hint { font-size: 0.6rem; color: var(--text-mute); text-align: center; margin: 6px 0 0; }

  /* ── LEVEL CARD ── */
  .level-card {
    margin-top: 0;
    margin-bottom: 10px;
    background: var(--surface);
    border-radius: 14px;
    padding: 16px;
    border: 1.5px solid var(--border);
    box-shadow: 0 2px 8px var(--shadow);
    transition: border-color 0.2s;
  }
  .level-card-section-title {
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.04em;
    margin-bottom: 4px;
  }
  .camp-subtitle {
    font-size: 0.75rem;
    color: var(--text-sub);
    margin-bottom: 10px;
    letter-spacing: 0.03em;
  }
  .camp-level-row {
    background: var(--surface2);
    border-radius: 8px;
    padding: 8px 10px;
    margin-bottom: 10px;
  }
  .level-card-head {
    display: flex;
    align-items: baseline;
    gap: 9px;
    margin-bottom: 9px;
  }
  .level-badge {
    font-family: Georgia, serif;
    font-size: 0.65rem;
    padding: 2px 8px;
    border-radius: 5px;
    font-weight: bold;
  }
  .level-title { font-size: 0.95rem; }
  .level-desc { font-size: 0.77rem; color: var(--text-sub); line-height: 1.8; }

  /* ── INSIGHT ── */
  .insight-card {
    margin-top: 0;
    margin-bottom: 10px;
    padding: 10px 14px;
    background: var(--surface);
    border-radius: 10px;
    font-size: 0.71rem;
    color: var(--text-sub);
    line-height: 1.7;
    border-left: 3px solid var(--border);
    box-shadow: 0 1px 4px var(--shadow);
  }

  /* ── ARROW NOTE ── */
  .arrow-card {
    margin-top: 0;
    margin-bottom: 10px;
    background: var(--surface);
    border-radius: 10px;
    padding: 12px 14px;
    border: 1.5px solid var(--border);
    box-shadow: 0 1px 4px var(--shadow);
  }
  .arrow-head {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
  }
  .arrow-label { font-size: 0.65rem; font-weight: bold; letter-spacing: 0.06em; }
  .arrow-desc { font-size: 0.72rem; color: var(--text-sub); line-height: 1.65; }

  /* ── COMPARE ── */
  .compare-card {
    margin-top: 10px;
    background: var(--surface);
    border-radius: 12px;
    padding: 12px 14px;
    border: 1.5px solid var(--border);
    box-shadow: 0 1px 4px var(--shadow);
  }
  .compare-title { font-size: 0.62rem; color: var(--text-mute); letter-spacing: 0.1em; margin-bottom: 8px; }
  .compare-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 5px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.7rem;
  }
  .compare-row:last-child { border-bottom: none; }
  .compare-left { color: var(--text-sub); }
  .compare-right { display: flex; gap: 8px; align-items: center; }
  .compare-dist { font-size: 0.62rem; color: var(--text-mute); }
  .compare-speed { font-size: 0.7rem; font-weight: bold; }
</style>
</head>

// ── Helpers ───────────────────────────────────────────────────────────────────

// ── SVG constants (horizontal track) ─────────────────────────────────────────
const SVG_VW=420, SVG_VH=92;
const ML=28, MR=28;          // left/right margin
const TW=SVG_VW-ML-MR;      // track width (364)
const LW=TW/8;               // gap per level
const TY=46;                 // track y-center
function levelToX(l){ return ML+(l-1)*LW; }
function xToLevel(vx){ return Math.max(1,Math.min(9,Math.round((vx-ML)/LW+1))); }
function lerp(a,b,t){ return a+(b-a)*t; }
function lerpColor(h1,h2,t){
  const p=h=>[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
  const [r1,g1,b1]=p(h1),[r2,g2,b2]=p(h2);
  return `rgb(${Math.round(lerp(r1,r2,t))},${Math.round(lerp(g1,g2,t))},${Math.round(lerp(b1,b2,t))})`;
}
function zoneColor(l){
  if(l<=3) return "#6BAF8A";
  if(l<=6) return "#C9963A";
  return "#C07070";
}
function getZone(l){ return l<=3?"healthy":l<=6?"average":"unhealthy"; }

// ── Render helpers ────────────────────────────────────────────────────────────

function el(tag, attrs={}, ...children){
  const e = document.createElement(tag);
  for(const [k,v] of Object.entries(attrs)){
    if(k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='class') e.className=v;
    else if(k==='style' && typeof v==='object') Object.assign(e.style,v);
    else e.setAttribute(k,v);
  }
  for(const c of children){
    if(c==null||c===false) continue;
    e.appendChild(typeof c==='string'?document.createTextNode(c):c);
  }
  return e;
}

function svgEl(tag, attrs={}){
  const e=document.createElementNS("http://www.w3.org/2000/svg",tag);
  for(const [k,v] of Object.entries(attrs)) e.setAttribute(k,v);
  return e;
}

  const tiles = Object.entries(KEYWORDS).map(([n, {kw, fear}])=>{
    const tile = el('div',{class:'type-tile'},
      el('div',{class:'tile-num'},n),
      el('div',{class:'tile-keyword'},kw),
      el('div',{class:'tile-fear'},fear)
    );
    tile.addEventListener('click',()=>{
      document.querySelectorAll('.type-tile').forEach(t=>t.classList.remove('selected'));
      tile.classList.add('selected');
      selectedType=+n;
      startBtn.disabled=false;
      startBtn.textContent=`タイプ${n}「${kw}」で始める`;
    });

  });

  startBtn.addEventListener('click',()=>{
    if(!selectedType) return;
    pegLevel=5; currentLevel=5;
    renderMain();
  });

  const grid = el('div',{class:'type-grid'},...tiles);

  document.getElementById('app').innerHTML='';
  document.getElementById('app').appendChild(
    el('div',{},
      el('div',{class:'setup-header'},
        el('div',{class:'setup-eyebrow'},'ENNEAGRAM'),
        el('h1',{class:'setup-title'},'健全度の杭'),
        el('p',{class:'setup-sub'},'自分の「重力の中心」を知り、日々の振れ幅を観察する')
      ),
      grid,
      startBtn
    )
  );
}

// ── Level card (only called at drag-start, drag-end, snap-complete) ──────────

function updateLevelCard(){
  const round = Math.round(currentLevel);
  const dist  = Math.abs(round - pegLevel);
  const tension = dist / 8;
  const type  = TYPES[selectedType];
  const zone  = getZone(round);
  const bandC = tension>0 ? lerpColor("#6BAF8A","#C07070",tension) : 'transparent';

  // ② キャンプ地🏕 level display update
  const pv = document.getElementById('peg-val');
  if(pv){ pv.style.color=zoneColor(pegLevel); pv.childNodes[0].textContent=`Lv.${pegLevel}`; }
  const pt = document.getElementById('peg-title');
  if(pt) pt.textContent = type.levels[pegLevel-1].title;

  // Snap button
  const sb = document.getElementById('snap-btn');
  if(sb){
    if(dist===0){ sb.textContent='キャンプ地に戻る🏃'; sb.className='snap-btn inactive'; }
    else { sb.textContent='キャンプ地に戻る🏃'; sb.className='snap-btn active'; }
  }

  // Level card
  const lc    = document.getElementById('level-card');
  const ldescEl = document.getElementById('level-desc');
  const lch   = document.getElementById('level-card-head');
  const lb    = document.getElementById('level-badge');
  const lt    = document.getElementById('level-title-text');
  if(!hasTouched){
    if(lc) lc.style.borderColor='var(--border)';
    if(lch) lch.style.display='none';
    if(ldescEl){ ldescEl.textContent='バーを直接タッチして、日々の変化を確認してみよう！'; ldescEl.style.textAlign='center'; ldescEl.style.color='var(--text-sub)'; }
  } else {
    const ld = type.levels[round-1];
    if(lc) lc.style.borderColor = zoneColor(round)+'55';
    if(lch) lch.style.display='flex';
    if(lb){ lb.textContent=`Lv.${round}`; lb.style.color=zoneColor(round); lb.style.background=zoneColor(round)+'20'; }
    if(lt){ lt.textContent=ld.title; }
    if(ldescEl){ ldescEl.style.textAlign=''; ldescEl.style.color=''; ldescEl.textContent=ld.desc; }
  }

  const ic = document.getElementById('insight-card');
  if(ic){
    if(!hasTouched){ ic.style.display='none'; }
    else if(dist===0){
      ic.style.display='block';
      ic.style.borderLeftColor='#B8834A';
      ic.textContent='日常的に慣れ親しんだ場所で落ち着いています😴';
    } else {
      const msgs = [
        'キャンプ地🏕から1段階離れています。のんびり戻ります😙',
        'キャンプ地🏕から2段階離れています。ゆっくり戻ります😃',
        'キャンプ地🏕から3段階離れています。そろそろ戻ろうかな🙂',
        'キャンプ地🏕から4段階離れています。少し急いで戻ります😳',
        'キャンプ地🏕から5段階離れています。急ぎ足で戻ります🤨',
        'キャンプ地🏕から6段階離れています。かなり急いで戻ります😣',
        'キャンプ地🏕から7段階離れています。急いで戻らないとまずいです😨',
        'キャンプ地🏕から8段階離れています。大慌てで戻ります😱',
      ];
      ic.style.display='block';
      ic.style.borderLeftColor=bandC;
      ic.textContent=msgs[dist-1];
    }
  }

  // ① Arrow card – same timing as level card
  const ac = document.getElementById('arrow-card');
  if(ac){
    if(!hasTouched||zone==='average'){ ac.style.display='none'; }
    else{
      ac.style.display='block';
      const isHealthy = zone==='healthy';
      const arrowData = isHealthy?type.integrates:type.disintegrates;
      const c = isHealthy?'#6BAF8A':'#C07070';
      ac.style.borderColor=c+'44';
      const ai = document.getElementById('arrow-icon');
      if(ai){ ai.textContent=isHealthy?'✦':'⚡'; ai.style.color=c; }
      const al = document.getElementById('arrow-label');
      if(al){ al.textContent=`${isHealthy?'統合':'分裂'}方向（タイプ${arrowData.to}）`; al.style.color=c; }
      const ad = document.getElementById('arrow-desc');
      if(ad) ad.textContent=arrowData.quality;
    }
  }
}

// ── Refresh DOM (SVG + snap button only during animation) ────────────────────

function refreshAll(){
  const round  = Math.round(currentLevel);
  const dist   = Math.abs(round-pegLevel);
  const tension= dist/8;
  const bandC  = tension>0?lerpColor("#6BAF8A","#C07070",tension):'transparent';

  // Snap button state only
  const sb = document.getElementById('snap-btn');
  if(sb){
    if(isSnapping){ sb.textContent='⟲ 戻り中...'; sb.className='snap-btn inactive'; }
    else if(dist===0){ sb.textContent='キャンプ地に戻る🏃'; sb.className='snap-btn inactive'; }
    else { sb.textContent='キャンプ地に戻る🏃'; sb.className='snap-btn active'; }
  }

  // SVG only during animation
  refreshSVG(round, dist, tension, bandC);
}

function refreshSVG(round, dist, tension, bandC){
  const dg = document.getElementById('svg-dynamic');
  if(!dg) return;
  dg.innerHTML='';

  const pegX = levelToX(pegLevel);
  const curX = levelToX(currentLevel);

  // Rubber band (horizontal, bulges upward)
  if(dist>0){
    const midX=(pegX+curX)/2;
    const bulge=Math.min(20,dist*4);
    const path=`M ${pegX} ${TY} Q ${midX} ${TY-bulge} ${curX} ${TY}`;
    const bandW=1.5+tension*3.5;
    dg.appendChild(svgEl('path',{d:path,stroke:bandC,strokeWidth:bandW+5,strokeLinecap:'round',fill:'none',opacity:'0.12'}));
    const band=svgEl('path',{d:path,stroke:bandC,strokeWidth:bandW,strokeLinecap:'round',fill:'none',opacity:'0.75'});
    if(tension<0.25) band.setAttribute('stroke-dasharray','4 3');
    dg.appendChild(band);
  }

  // 🏕 Camp marker
  const pg=svgEl('g');
  const campEmoji=svgEl('text'); campEmoji.setAttribute('x',pegX); campEmoji.setAttribute('y',TY-18);
  campEmoji.setAttribute('text-anchor','middle'); campEmoji.setAttribute('font-size','14');
  campEmoji.textContent='🏕';
  pg.appendChild(campEmoji);
  pg.appendChild(svgEl('circle',{cx:pegX,cy:TY,r:7,fill:'#B8834A'}));
  pg.appendChild(svgEl('circle',{cx:pegX,cy:TY,r:3.5,fill:'#FBF8F3'}));
  dg.appendChild(pg);

  // 👣 Current marker
  const cg=svgEl('g');
  const cc=zoneColor(round);
  cg.appendChild(svgEl('circle',{cx:curX,cy:TY,r:16,fill:cc,opacity:'0.10'}));
  const circ=svgEl('circle',{cx:curX,cy:TY,r:11,fill:cc,stroke:'#FBF8F3',strokeWidth:2});
  circ.style.filter=`drop-shadow(0 2px 5px ${cc}55)`;
  cg.appendChild(circ);
  const numT=svgEl('text'); numT.setAttribute('x',curX); numT.setAttribute('y',TY+4);
  numT.setAttribute('text-anchor','middle'); numT.setAttribute('font-size','9.5');
  numT.setAttribute('fill','#FBF8F3'); numT.setAttribute('font-weight','bold');
  numT.setAttribute('font-family','Georgia,serif'); numT.textContent=round;
  cg.appendChild(numT);
  const footT=svgEl('text'); footT.setAttribute('x',curX); footT.setAttribute('y',TY+26);
  footT.setAttribute('text-anchor','middle'); footT.setAttribute('font-size','13');
  footT.textContent='👣';
  cg.appendChild(footT);
  dg.appendChild(cg);
}

// ── Snap animation ────────────────────────────────────────────────────────────

function snapBack(){
  const dist=Math.abs(Math.round(currentLevel)-pegLevel);
  if(isSnapping||dist===0) return;
  stopAnim();
  const startLevel=currentLevel, endLevel=pegLevel;
  const tension=dist/8;
  const duration=lerp(2200,380,tension);
  const startTime=performance.now();
  isSnapping=true; refreshAll();

  function animate(now){
    const t=Math.min(1,(now-startTime)/duration);
    let eased;
    if(tension>=0.5){
      if(t===0) eased=0;
      else if(t>=1) eased=1;
      else { const c4=(2*Math.PI)/3; eased=Math.pow(2,-10*t)*Math.sin((t*10-0.75)*c4)+1; }
    } else {
      eased=1-Math.pow(1-t,3);
    }
    currentLevel=startLevel+(endLevel-startLevel)*eased;
    refreshAll();
    if(t<1) animFrame=requestAnimationFrame(animate);
    else { currentLevel=endLevel; isSnapping=false; refreshAll(); updateLevelCard(); }
  }
  animFrame=requestAnimationFrame(animate);
}

function stopAnim(){
  if(animFrame) { cancelAnimationFrame(animFrame); animFrame=null; }
  isSnapping=false;
}

// ── Drag (horizontal, viewBox-aware) ─────────────────────────────────────────

function getSvgX(e){
  if(!svgNode) return null;
  const rect=svgNode.getBoundingClientRect();
  const clientX=e.touches?e.touches[0].clientX:e.clientX;
  return (clientX-rect.left)/rect.width*SVG_VW;
}

function startDrag(e){
  e.preventDefault();
  if(isSnapping){ stopAnim(); }
  isDragging=true;
  hasTouched=true;
  const x=getSvgX(e);
  if(x!==null){ currentLevel=xToLevel(x); refreshAll(); }

  function onMove(e2){
    if(!isDragging) return;
    const x2=getSvgX(e2);
    if(x2!==null){ currentLevel=xToLevel(x2); refreshAll(); }
  }
  function onEnd(){
    isDragging=false;
    updateLevelCard();
    window.removeEventListener('mousemove',onMove);
    window.removeEventListener('mouseup',onEnd);
    window.removeEventListener('touchmove',onMove);
    window.removeEventListener('touchend',onEnd);
  }
  window.addEventListener('mousemove',onMove);
  window.addEventListener('mouseup',onEnd);
  window.addEventListener('touchmove',onMove,{passive:false});
  window.addEventListener('touchend',onEnd);
}

// ── Boot ──────────────────────────────────────────────────────────────────────

renderSetup();
</script>
